name: Build SuperMarioBros

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # -----------------------------
      # Install Flex / Bison
      # -----------------------------
      - name: Install Flex/Bison
        run: choco install winflexbison3 -y

      - name: Add Flex/Bison to PATH
        run: echo "C:\ProgramData\chocolatey\bin" >> $env:GITHUB_PATH

      # -----------------------------
      # Install vcpkg + dependencies
      # -----------------------------
      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          C:\vcpkg\vcpkg install sdl2:x64-windows boost:x64-windows

      # -----------------------------
      # Configure CMake
      # -----------------------------
      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 ^
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake ^
            -DVCPKG_TARGET_TRIPLET=x64-windows ^
            -DBISON_EXECUTABLE=C:/ProgramData/chocolatey/bin/win_bison.exe ^
            -DFLEX_EXECUTABLE=C:/ProgramData/chocolatey/bin/win_flex.exe

      # -----------------------------
      # Build
      # -----------------------------
      - name: Build
        run: |
          cd build
          cmake --build . --config Release

      # -----------------------------
      # Upload artifact
      # -----------------------------
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: SuperMarioBros-Windows
          path: build/Release/
